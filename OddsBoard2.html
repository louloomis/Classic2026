<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Columbine Classic 2026 — Live Odds Board (Light)</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  /* ── LIGHT THEME — white background, Columbine blue + gold accents ── */
  --bg:        #F4F6FB;
  --surface:   #FFFFFF;
  --border:    #D0D8EE;
  --border2:   #2F4696;
  --blue:      #2F4696;
  --blue-dim:  #1A2B5E;
  --blue-lt:   #5B78C4;
  --gold:      #B8920A;
  --gold-dim:  #8A6F2E;
  --win:       #1470A8;
  --win-dim:   #0A4070;
  --win-bg:    #E8F3FA;
  --show:     #1A7A48;
  --show-dim: #0F5030;
  --show-bg:  #E8F7EF;
  --shootout:      #9A6A0A;
  --shootout-dim:  #6A4808;
  --shootout-bg:   #FBF4E0;
  --danger:    #C0252A;
  --text:      #1A2240;
  --text-dim:  #7080A8;
  --text-mid:  #4A5A80;
  --font-head: "Bebas Neue", sans-serif;
  --font-mono: "DM Mono", monospace;
  --font-body: "DM Sans", sans-serif;
}
html, body {
  background: var(--bg); color: var(--text);
  font-family: var(--font-body); height: 100vh; overflow: hidden; user-select: none;
}
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--blue);
  border-bottom: 3px solid #D4AF5A;
}
.header-top { display: flex; align-items: center; padding: 8px 20px 6px; gap: 16px; }
.header-logo {
  height: 58px; width: 58px; border-radius: 50%; overflow: hidden;
  background: transparent; flex-shrink: 0;
}
.header-logo img { height: 100%; width: 100%; object-fit: contain; }
.logo {
  font-family: var(--font-head); font-size: 36px; letter-spacing: 3px;
  color: white; line-height: 1; flex-shrink: 0;
}
.logo-sub {
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 3px;
  color: rgba(255,255,255,0.65); text-transform: uppercase;
}
.pools { display: flex; gap: 10px; margin-left: auto; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
.pool-chip {
  font-family: var(--font-mono); font-size: 26px; font-weight: 500;
  padding: 10px 20px; border-radius: 4px; border: 1px solid;
}
.pool-chip.win   { color: var(--win);   border-color: var(--win-dim);   background: var(--win-bg); }
.pool-chip.show  { color: var(--show); border-color: var(--show-dim); background: var(--show-bg); }
.pool-chip.shootout { color: var(--shootout); border-color: var(--shootout-dim); background: var(--shootout-bg); }
.pool-chip.grand { color: #D4AF5A;      border-color: #8A6F2E;          background: var(--blue-dim); }
.header-bottom {
  display: flex; align-items: center; padding: 4px 20px 6px; gap: 16px;
  background: var(--blue-dim); border-bottom: 1px solid rgba(255,255,255,0.15);
}
.slide-dots { display: flex; gap: 6px; align-items: center; }
.dot { width: 28px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.25); transition: background 0.3s; flex-shrink: 0; }
.dot.active  { background: #D4AF5A; }
.dot.combined { background: #D4AF5A; opacity: 0.5; }
.dot.active.combined { opacity: 1; }
.slide-label { font-family: var(--font-mono); font-size: 12px; color: rgba(255,255,255,0.6); letter-spacing: 2px; }
.timestamp { font-family: var(--font-mono); font-size: 11px; color: rgba(255,255,255,0.45); margin-left: auto; }
#progress-bar { height: 3px; background: rgba(0,0,0,0.08); position: relative; overflow: hidden; }
#progress-fill { position: absolute; left: 0; top: 0; bottom: 0; background: #D4AF5A; width: 0%; }
#slide-a, #slide-b {
  position: fixed; top: 136px; left: 14px; right: 14px; bottom: 14px;
  transition: opacity 0.5s ease, transform 0.5s ease;
}
#slide-a.hidden, #slide-b.hidden { opacity: 0; pointer-events: none; transform: translateY(16px); }
#slide-a.visible, #slide-b.visible { opacity: 1; pointer-events: all; transform: translateY(0); }
.flight-slide { display: flex; flex-direction: column; gap: 8px; height: 100%; }
.flight-block { flex: 1; display: grid; grid-template-columns: 80px 1fr; gap: 8px; min-height: 0; }
.flight-label {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border-radius: 8px; border: 2px solid; font-family: var(--font-head); line-height: 1.1;
}
.flight-label .fl-num  { font-size: 36px; letter-spacing: 1px; }
.flight-label .fl-word { font-size: 11px; letter-spacing: 3px; opacity: 0.65; }
.teams-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
.team-box { border-radius: 8px; border: 1px solid; display: flex; flex-direction: column; overflow: hidden; min-height: 0; box-shadow: 0 1px 4px rgba(47,70,150,0.07); }
.team-top { padding: 6px 8px 4px; display: flex; flex-direction: column; gap: 2px; flex: 1; }
.team-num { font-family: var(--font-head); font-size: 22px; line-height: 1; }
.team-names { display: flex; flex-direction: column; gap: 1px; margin-top: 1px; }
.name-line { font-family: var(--font-body); font-size: 18px; font-weight: 500; color: var(--text); line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; gap: 3px; align-items: baseline; }
.name-prefix { font-family: var(--font-mono); font-size: 14px; font-weight: 500; opacity: 0.65; flex-shrink: 0; letter-spacing: 0.5px; }
.name-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.team-total { font-family: var(--font-mono); font-size: 22px; font-weight: 500; color: var(--text-dim); margin-top: 3px; }
.team-total span { color: var(--gold); }
.odds-row { display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid; }
.odds-cell { padding: 5px 4px; text-align: center; font-family: var(--font-mono); line-height: 1; }
.odds-cell .odds-label { font-size: 14px; letter-spacing: 1px; opacity: 0.6; display: block; margin-bottom: 2px; text-transform: uppercase; }
.odds-cell .odds-val   { font-size: 24px; font-weight: 500; display: block; line-height: 1; }
.odds-cell.win-cell   { color: var(--win);   border-right: 1px solid; }
.odds-cell.show-cell { color: var(--show); border-right: 1px solid; }
.odds-cell.shootout-cell  { color: var(--shootout); }
.odds-cell.no-bets .odds-val { color: var(--text-dim); opacity: 0.4; font-size: 16px; }
.list-slide { height: 100%; display: flex; flex-direction: column; overflow: hidden; }
.list-header { display: flex; align-items: center; gap: 16px; padding: 10px 16px; border-radius: 8px; margin-bottom: 10px; flex-shrink: 0; }
.list-header.top    { background: var(--win-bg);   border: 1px solid var(--win-dim); }
.list-header.bottom { background: #FDE8E8;          border: 1px solid #C07070; }
.list-header-title  { font-family: var(--font-head); font-size: 32px; letter-spacing: 2px; }
.list-header.top    .list-header-title { color: var(--win); }
.list-header.bottom .list-header-title { color: var(--danger); }
.list-header-sub { font-family: var(--font-mono); font-size: 11px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; }
.list-col-labels {
  display: grid; grid-template-columns: 40px 50px 1fr 120px 110px 110px 110px;
  gap: 8px; padding: 0 12px 6px; border-bottom: 1px solid var(--border);
  flex-shrink: 0; margin-bottom: 4px;
}
.list-col-labels span { font-family: var(--font-mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); text-align: right; }
.list-col-labels span:nth-child(1) { text-align: center; }
.list-col-labels span:nth-child(2) { text-align: center; }
.list-col-labels span:nth-child(3) { text-align: left; }
.list-rows { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 4px; }
.list-row {
  display: grid; grid-template-columns: 40px 50px 1fr 120px 110px 110px 110px;
  gap: 8px; padding: 8px 12px; border-radius: 6px;
  border: 1px solid var(--border); align-items: center;
  flex-shrink: 0; background: var(--surface);
}
.list-row:nth-child(odd) { background: #F0F3FB; }
.rank-badge { font-family: var(--font-head); font-size: 22px; text-align: center; line-height: 1; }
.rank-1   { color: #B8920A; }
.rank-2   { color: #707070; }
.rank-3   { color: #8A5A10; }
.rank-top { color: var(--win); }
.rank-bot { color: var(--danger); }
.list-team-num { font-family: var(--font-head); font-size: 20px; color: var(--gold); text-align: center; line-height: 1; }
.list-team-name { display: flex; flex-direction: column; gap: 1px; overflow: hidden; }
.list-name-line { font-family: var(--font-body); font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; gap: 4px; align-items: baseline; }
.list-name-prefix { font-family: var(--font-mono); font-size: 10px; color: var(--gold); opacity: 0.8; flex-shrink: 0; }
.list-total { font-family: var(--font-mono); font-size: 18px; font-weight: 500; color: var(--gold); text-align: right; }
.list-odds { font-family: var(--font-mono); font-size: 18px; font-weight: 500; text-align: right; }
.list-odds.win-odds   { color: var(--win); }
.list-odds.place-odds { color: var(--show); }
.list-odds.show-odds  { color: var(--shootout); }
.list-odds.no-bet { color: var(--text-dim); opacity: 0.4; font-size: 14px; }
#config-overlay { position: fixed; inset: 0; background: rgba(235,240,255,0.97); z-index: 500; display: flex; align-items: center; justify-content: center; }
#config-overlay.hidden { display: none; }
.config-box { background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 32px; width: 500px; box-shadow: 0 8px 40px rgba(47,70,150,0.15); }
.config-title { font-family: var(--font-head); font-size: 28px; color: var(--blue); margin-bottom: 8px; letter-spacing: 2px; }
.config-note { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); line-height: 1.7; background: #EBEEF8; border: 1px solid var(--border); border-radius: 4px; padding: 10px 12px; margin-bottom: 18px; }
.config-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.config-field label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); }
.config-field input { background: #FFFFFF; border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--font-mono); font-size: 12px; padding: 10px 12px; outline: none; width: 100%; }
.config-field input:focus { border-color: var(--blue); }
.btn-start { width: 100%; background: var(--blue); color: white; font-family: var(--font-head); font-size: 22px; letter-spacing: 2px; border: 2px solid #D4AF5A; border-radius: 6px; padding: 13px; cursor: pointer; margin-top: 6px; }
.btn-start:hover { background: var(--blue-dim); }
#status-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #FDE8E8; border-top: 1px solid #C07070; color: var(--danger); font-family: var(--font-mono); font-size: 11px; padding: 6px 16px; display: none; }
#status-bar.visible { display: block; }

.combined-slide { height: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.combined-panel { display: flex; flex-direction: column; overflow: hidden; }
.list-row-compact {
  display: grid; grid-template-columns: 32px 40px 1fr 90px 80px 80px 80px;
  gap: 4px; padding: 7px 8px; border-radius: 4px;
  border: 1px solid var(--border); align-items: center;
  flex-shrink: 0; background: var(--surface); font-size: 14px;
}
.list-row-compact:nth-child(odd) { background: #F0F3FB; }
.list-rows-compact { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 3px; }
.list-col-labels-compact {
  display: grid; grid-template-columns: 32px 40px 1fr 90px 80px 80px 80px;
  gap: 4px; padding: 0 8px 4px; border-bottom: 1px solid var(--border);
  flex-shrink: 0; margin-bottom: 2px;
}
.list-col-labels-compact span { font-family: var(--font-mono); font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); text-align: right; }
.list-col-labels-compact span:nth-child(3) { text-align: left; }
.list-header-compact { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 6px; margin-bottom: 6px; flex-shrink: 0; }
.list-header-compact.top    { background: var(--win-bg);   border: 1px solid var(--win-dim); }
.list-header-compact.bottom { background: #FDE8E8;          border: 1px solid #C07070; }
.list-header-compact .list-header-title { font-family: var(--font-head); font-size: 22px; letter-spacing: 2px; }
.list-header-compact.top    .list-header-title { color: var(--win); }
.list-header-compact.bottom .list-header-title { color: var(--danger); }
.rank-badge-sm { font-family: var(--font-head); font-size: 19px; text-align: center; line-height: 1; }
.list-team-num-sm { font-family: var(--font-head); font-size: 16px; color: var(--gold); text-align: center; line-height: 1; }
.list-name-single { font-family: var(--font-body); font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-total-sm { font-family: var(--font-mono); font-size: 15px; font-weight: 500; color: var(--gold); text-align: right; }
.list-odds-sm { font-family: var(--font-mono); font-size: 15px; font-weight: 500; text-align: right; }
.list-odds-sm.win-odds   { color: var(--win); }
.list-odds-sm.place-odds { color: var(--show); }
.list-odds-sm.show-odds  { color: var(--shootout); }
.list-odds-sm.no-bet { color: var(--text-dim); opacity: 0.4; font-size: 13px; }
</style>
</head>
<body>
<div id="config-overlay">
  <div class="config-box">
    <div class="config-title">ODDS BOARD SETUP</div>
    <div class="config-note">
      Proxy URL is pre-configured. Confirm event name and click Start.<br>
      Odds refresh every 30 seconds. Slides advance every 10 seconds.<br>
      Press Escape or double-click to return here.
    </div>
    <div class="config-field"><label>Proxy URL</label><input type="text" id="cfg-proxy"></div>
    <div class="config-field"><label>Event Name</label><input type="text" id="cfg-event"></div>
    <button class="btn-start" onclick="startDisplay()">START DISPLAY</button>
  </div>
</div>

      <div class="logo" id="logo-text">COLUMBINE CLASSIC</div>
      <div class="logo-sub">LIVE ODDS BOARD · LIGHT</div>
    </div>
    <div class="pools">
      <div class="pool-chip win"   id="pool-win">WIN $—</div>
      <div class="pool-chip show" id="pool-show">SHOW $—</div>
      <div class="pool-chip shootout" id="pool-shootout">SHOOT-OUT $—</div>
      <div class="pool-chip grand" id="pool-grand">TOTAL $—</div>
    </div>
  </div>
  <div class="header-bottom">
    <div class="slide-dots" id="slide-dots"></div>
    <div class="slide-label" id="slide-label">FLIGHTS 1–4</div>
    <div class="timestamp" id="timestamp">Last updated: —</div>
  </div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>
<div id="slide-a" class="visible"></div>
<div id="slide-b" class="hidden"></div>
<div id="status-bar"></div>
<script>
var DEFAULT_PROXY = 'https://classicpari.landcreations.workers.dev';
var DEFAULT_EVENT = 'Columbine Classic 2026';
var TOTAL_SLIDES=5,FLIGHTS_PER_SLIDE=4,TEAMS_PER_FLIGHT=6,TOTAL_FLIGHTS=16;
var SLIDE_DURATIONS=[10000,10000,10000,10000,20000],REFRESH_INTERVAL=30000,PROGRESS_INTERVAL=50;
var SLIDE_TYPES=['flights','flights','flights','flights','combined'];
var FLIGHT_STYLES=[
  {bg:"#EEF2FC",border:"#4A68C8",label:"#2A48A8"},
  {bg:"#EEF8F2",border:"#2A8A50",label:"#1A6A38"},
  {bg:"#FBF6E8",border:"#9A7820",label:"#7A5800"},
  {bg:"#F6EEF8",border:"#8A4AAA",label:"#6A2A8A"},
  {bg:"#EAF2FA",border:"#2A6AAA",label:"#0A4A8A"},
  {bg:"#FAF2E8",border:"#AA7020",label:"#8A5000"},
  {bg:"#EEF8F4",border:"#1A9060",label:"#0A7040"},
  {bg:"#FAEEf0",border:"#AA3050",label:"#8A1030"},
  {bg:"#EEF2FC",border:"#5A78E8",label:"#3A58C8"},
  {bg:"#EDF7F0",border:"#2A9A48",label:"#0A7A28"},
  {bg:"#F4EEF8",border:"#9A58C8",label:"#7A38A8"},
  {bg:"#FAF0EE",border:"#AA6038",label:"#8A4018"},
  {bg:"#EAF2FA",border:"#2A88C8",label:"#0A68A8"},
  {bg:"#F8F8EA",border:"#9A9020",label:"#7A7000"},
  {bg:"#EAF6F4",border:"#1A9888",label:"#0A7868"},
  {bg:"#FAEEf2",border:"#AA3058",label:"#8A1038"},
];
var proxyUrl=DEFAULT_PROXY,eventName=DEFAULT_EVENT,oddsData=null;
var currentSlide=0,activeEl='a',slideTimer=null,refreshTimer=null,progressTimer=null,progressStart=null;
function sheetsUrl(p){return proxyUrl+'/sheets?'+p;}
window.addEventListener('DOMContentLoaded',function(){
  try{var saved=JSON.parse(localStorage.getItem('oddsboard_cfg2')||'{}');if(saved.proxy)proxyUrl=saved.proxy;if(saved.eventName)eventName=saved.eventName;}catch(e){}
  document.getElementById('cfg-proxy').value=proxyUrl;
  document.getElementById('cfg-event').value=eventName;
  var dots=document.getElementById('slide-dots');
  for(var i=0;i<TOTAL_SLIDES;i++){var d=document.createElement('div');var extra=i===4?' combined':'';d.className='dot'+extra+(i===0?' active':'');d.id='dot-'+i;dots.appendChild(d);}
  startDisplay();
});
function startDisplay(){
  proxyUrl=document.getElementById('cfg-proxy').value.trim()||DEFAULT_PROXY;
  eventName=document.getElementById('cfg-event').value.trim()||DEFAULT_EVENT;
  localStorage.setItem('oddsboard_cfg2',JSON.stringify({proxy:proxyUrl,eventName:eventName}));
  document.getElementById('config-overlay').classList.add('hidden');
  document.getElementById('logo-text').textContent=eventName.toUpperCase();
  clearTimeout(slideTimer);clearInterval(refreshTimer);clearInterval(progressTimer);
  fetchOdds().then(function(){startSlideshow();});
  refreshTimer=setInterval(fetchOdds,REFRESH_INTERVAL);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')showConfig();});
  document.addEventListener('dblclick',showConfig);
}
function showConfig(){
  clearTimeout(slideTimer);clearInterval(refreshTimer);clearInterval(progressTimer);
  document.getElementById('cfg-proxy').value=proxyUrl;
  document.getElementById('cfg-event').value=eventName;
  document.getElementById('config-overlay').classList.remove('hidden');
}
async function fetchOdds(){
  try{
    var res=await fetch(sheetsUrl('action=getOdds'));
    var data=await res.json();
    if(data.success){oddsData=data;updateHeader(data.pools,data.timestamp);renderSlide(currentSlide,getActiveEl());hideError();}
    else showError('Sheet error: '+(data.error||'unknown'));
  }catch(e){showError('Fetch failed: '+e.message);}
}
function updateHeader(pools,ts){
  document.getElementById('pool-win').textContent='WIN $'+fmt(pools.win);
  document.getElementById('pool-show').textContent='SHOW $'+fmt(pools.show);
  document.getElementById('pool-shootout').textContent='SHOOT-OUT $'+fmt(pools.shootout);
  document.getElementById('pool-grand').textContent='TOTAL $'+fmt(pools.grand);
  document.getElementById('timestamp').textContent='Updated: '+ts;
}
function fmt(n){return Number(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fmtMoney(n){return '$'+fmt(n);}
function startSlideshow(){
  currentSlide=0;
  renderSlide(0,getActiveEl());updateDots(0);updateSlideLabel(0);startProgress();
  slideTimer=setTimeout(function(){advanceSlide();},SLIDE_DURATIONS[0]);
}
function advanceSlide(){
  clearTimeout(slideTimer);
  var nextSlide=(currentSlide+1)%TOTAL_SLIDES,nextEl=activeEl==='a'?'b':'a';
  renderSlide(nextSlide,document.getElementById('slide-'+nextEl));
  document.getElementById('slide-'+activeEl).classList.remove('visible');
  document.getElementById('slide-'+activeEl).classList.add('hidden');
  document.getElementById('slide-'+nextEl).classList.remove('hidden');
  document.getElementById('slide-'+nextEl).classList.add('visible');
  activeEl=nextEl;currentSlide=nextSlide;
  updateDots(currentSlide);updateSlideLabel(currentSlide);startProgress();
  slideTimer=setTimeout(function(){advanceSlide();},SLIDE_DURATIONS[currentSlide]);
}
function getActiveEl(){return document.getElementById('slide-'+activeEl);}
function updateDots(idx){
  for(var i=0;i<TOTAL_SLIDES;i++){
    var d=document.getElementById('dot-'+i);if(!d)continue;
    var extra=i===4?' combined':'';
    d.className='dot'+extra+(i===idx?' active':'');
  }
}
function updateSlideLabel(idx){
  var type=SLIDE_TYPES[idx];
  if(type==='combined'){document.getElementById('slide-label').textContent='MOST WAGERED vs LEAST WAGERED';}
  else{
    var sf=idx*FLIGHTS_PER_SLIDE+1,ef=sf+FLIGHTS_PER_SLIDE-1;
    var st=idx*FLIGHTS_PER_SLIDE*TEAMS_PER_FLIGHT+1,et=st+FLIGHTS_PER_SLIDE*TEAMS_PER_FLIGHT-1;
    document.getElementById('slide-label').textContent='FLIGHTS '+sf+'–'+ef+' | TEAMS '+st+'–'+et;
  }
}
function startProgress(){
  clearInterval(progressTimer);progressStart=Date.now();
  var fill=document.getElementById('progress-fill');fill.style.width='0%';
  progressTimer=setInterval(function(){
    var pct=Math.min(((Date.now()-progressStart)/SLIDE_DURATIONS[currentSlide])*100,100);
    fill.style.width=pct+'%';
    if(pct>=100)clearInterval(progressTimer);
  },PROGRESS_INTERVAL);
}
function renderSlide(slideIdx,container){
  container.innerHTML='';
  var type=SLIDE_TYPES[slideIdx];
  if(type==='combined')renderCombinedSlide(container);
  else renderFlightSlide(container,slideIdx);
}
function renderFlightSlide(container,slideIdx){
  var wrap=document.createElement('div');wrap.className='flight-slide';
  var startFlight=slideIdx*FLIGHTS_PER_SLIDE;
  for(var f=0;f<FLIGHTS_PER_SLIDE;f++){
    var flightIdx=startFlight+f;if(flightIdx>=TOTAL_FLIGHTS)break;
    var flightNum=flightIdx+1,style=FLIGHT_STYLES[flightIdx];
    var block=document.createElement('div');block.className='flight-block';
    var label=document.createElement('div');label.className='flight-label';
    label.style.background=style.bg;label.style.borderColor=style.border;label.style.color=style.label;
    label.innerHTML='<span class="fl-word">FLIGHT</span><span class="fl-num">'+flightNum+'</span>';
    var teamsRow=document.createElement('div');teamsRow.className='teams-row';
    for(var t=0;t<TEAMS_PER_FLIGHT;t++){
      var teamNum=flightIdx*TEAMS_PER_FLIGHT+t+1,team=getTeamData(teamNum);
      var noBets=!team.winBets&&!team.showBets&&!team.shootoutBets;
      var box=document.createElement('div');box.className='team-box';
      box.style.background=style.bg;box.style.borderColor=style.border;
      var top=document.createElement('div');top.className='team-top';
      top.innerHTML=
        '<div class="team-num" style="color:'+style.label+'">#'+String(teamNum).padStart(2,'0')+'</div>'+
        '<div class="team-names">'+buildNameHTML(team.name,'name-prefix','name-text','name-line',style.label)+'</div>'+
        '<div class="team-total">'+(noBets?'<span style="opacity:0.4;font-size:12px">No bets yet</span>':'Bets: <span style="color:'+style.label+'">'+fmtMoney(team.total)+'</span>')+'</div>';
      var oddsRow=document.createElement('div');oddsRow.className='odds-row';oddsRow.style.borderColor=style.border;
      oddsRow.innerHTML=
        '<div class="odds-cell win-cell'+(!team.winBets?' no-bets':'')+'" style="border-color:'+style.border+'">'+'<span class="odds-label">Win</span><span class="odds-val">'+(!team.winBets?'—':esc(team.winOdds))+'</span></div>'+
        '<div class="odds-cell show-cell'+(!team.showBets?' no-bets':'')+'" style="border-color:'+style.border+'">'+'<span class="odds-label">Show</span><span class="odds-val">'+(!team.showBets?'—':esc(team.showOdds))+'</span></div>'+
        '<div class="odds-cell shootout-cell'+(!team.shootoutBets?' no-bets':'')+'">'+'<span class="odds-label">S-O</span><span class="odds-val">'+(!team.shootoutBets?'—':esc(team.shootoutOdds))+'</span></div>';
      box.appendChild(top);box.appendChild(oddsRow);teamsRow.appendChild(box);
    }
    block.appendChild(label);block.appendChild(teamsRow);wrap.appendChild(block);
  }
  container.appendChild(wrap);
}
function renderListSlide(container,mode){
  if(!oddsData||!oddsData.teams){container.innerHTML='<div style="color:var(--text-dim);font-family:var(--font-mono);padding:40px;text-align:center">Loading data…</div>';return;}
  var sorted=oddsData.teams.slice().sort(function(a,b){return b.total-a.total;});
  var teams=mode==='top'?sorted.slice(0,20):sorted.slice(-20).reverse();
  var wrap=document.createElement('div');wrap.className='list-slide';
  var hdr=document.createElement('div');hdr.className='list-header '+(mode==='top'?'top':'bottom');
  hdr.innerHTML='<div class="list-header-title">'+(mode==='top'?'🔥 MOST WAGERED TEAMS':'💎 VALUE HUNT — LEAST WAGERED TEAMS')+'</div>'+
    '<div class="list-header-sub" style="margin-left:auto">'+(mode==='top'?'Favorites · Sorted by total wagered ↓':'Long shots · Sorted by total wagered ↑')+'</div>';
  wrap.appendChild(hdr);
  var colLabels=document.createElement('div');colLabels.className='list-col-labels';
  colLabels.innerHTML='<span>Rank</span><span>Team</span><span>Name</span><span>Total Bets</span><span>Win Odds</span><span>Place Odds</span><span>Show Odds</span>';
  wrap.appendChild(colLabels);
  var rowsWrap=document.createElement('div');rowsWrap.className='list-rows';
  teams.forEach(function(team,i){
    var rankClass=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':mode==='top'?'rank-top':'rank-bot';
    var noBets=!team.winBets&&!team.showBets&&!team.shootoutBets;
    var row=document.createElement('div');row.className='list-row';
    row.innerHTML=
      '<div class="rank-badge '+rankClass+'">'+(i+1)+'</div>'+
      '<div class="list-team-num">#'+String(team.num).padStart(2,'0')+'</div>'+
      '<div class="list-team-name">'+buildNameHTML(team.name,'list-name-prefix','name-text','list-name-line','')+'</div>'+
      '<div class="list-total">'+(noBets?'<span style="opacity:0.3">$0</span>':fmtMoney(team.total))+'</div>'+
      '<div class="list-odds win-odds'+(!team.winBets?' no-bet':'')+'">'+(!team.winBets?'—':esc(team.winOdds))+'</div>'+
      '<div class="list-odds place-odds'+(!team.showBets?' no-bet':'')+'">'+(!team.showBets?'—':esc(team.showOdds))+'</div>'+
      '<div class="list-odds show-odds'+(!team.shootoutBets?' no-bet':'')+'">'+(!team.shootoutBets?'—':esc(team.shootoutOdds))+'</div>';
    rowsWrap.appendChild(row);
  });
  wrap.appendChild(rowsWrap);container.appendChild(wrap);
}
function renderCombinedSlide(container){
  if(!oddsData||!oddsData.teams){container.innerHTML='<div style="color:var(--text-dim);font-family:var(--font-mono);padding:40px;text-align:center">Loading data…</div>';return;}
  var sorted=oddsData.teams.slice().sort(function(a,b){return b.total-a.total;});
  var topTeams=sorted.slice(0,20);
  var botTeams=sorted.slice(-20).reverse();
  var wrap=document.createElement('div');wrap.className='combined-slide';
  ['top','bottom'].forEach(function(mode){
    var teams=mode==='top'?topTeams:botTeams;
    var panel=document.createElement('div');panel.className='combined-panel';
    var hdr=document.createElement('div');hdr.className='list-header-compact '+(mode==='top'?'top':'bottom');
    hdr.innerHTML='<div class="list-header-title">'+(mode==='top'?'🔥 MOST WAGERED':'💎 LEAST WAGERED')+'</div>';
    panel.appendChild(hdr);
    var colLabels=document.createElement('div');colLabels.className='list-col-labels-compact';
    colLabels.innerHTML='<span>#</span><span>Team</span><span>Name</span><span>Total</span><span>Win</span><span>Show</span><span>S-O</span>';
    panel.appendChild(colLabels);
    var rowsWrap=document.createElement('div');rowsWrap.className='list-rows-compact';
    teams.forEach(function(team,i){
      var rankClass=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':mode==='top'?'rank-top':'rank-bot';
      var noBets=!team.winBets&&!team.showBets&&!team.shootoutBets;
      var idx=team.name.indexOf(' + ');
      var displayName=idx===-1?esc(team.name):esc(team.name.substring(0,idx).trim())+' <span style="opacity:0.45">+</span> '+esc(team.name.substring(idx+3).trim());
      var row=document.createElement('div');row.className='list-row-compact';
      row.innerHTML=
        '<div class="rank-badge-sm '+rankClass+'">'+(i+1)+'</div>'+
        '<div class="list-team-num-sm">#'+String(team.num).padStart(2,'0')+'</div>'+
        '<div class="list-name-single">'+displayName+'</div>'+
        '<div class="list-total-sm">'+(noBets?'<span style="opacity:0.3">$0</span>':fmtMoney(team.total))+'</div>'+
        '<div class="list-odds-sm win-odds'+(!team.winBets?' no-bet':'')+'">'+(!team.winBets?'—':esc(team.winOdds))+'</div>'+
        '<div class="list-odds-sm place-odds'+(!team.showBets?' no-bet':'')+'">'+(!team.showBets?'—':esc(team.showOdds))+'</div>'+
        '<div class="list-odds-sm show-odds'+(!team.shootoutBets?' no-bet':'')+'">'+(!team.shootoutBets?'—':esc(team.shootoutOdds))+'</div>';
      rowsWrap.appendChild(row);
    });
    panel.appendChild(rowsWrap);wrap.appendChild(panel);
  });
  container.appendChild(wrap);
}
function buildNameHTML(fullName,prefixClass,textClass,lineClass,color){
  var style=color?'style="color:'+color+'"':'';
  var idx=fullName.indexOf(' + ');
  if(idx===-1)return '<div class="'+lineClass+'"><span class="'+textClass+'">'+esc(fullName)+'</span></div>';
  var p1=fullName.substring(0,idx).trim(),p2=fullName.substring(idx+3).trim();
  return '<div class="'+lineClass+'"><span class="'+prefixClass+'" '+style+'>M:</span><span class="'+textClass+'">'+esc(p1)+'</span></div>'+
         '<div class="'+lineClass+'"><span class="'+prefixClass+'" '+style+'>G:</span><span class="'+textClass+'">'+esc(p2)+'</span></div>';
}
function getTeamData(num){
  var empty={name:'Team '+num,winOdds:'—',showOdds:'—',shootoutOdds:'—',winBets:0,showBets:0,shootoutBets:0,total:0};
  if(!oddsData||!oddsData.teams)return empty;
  for(var i=0;i<oddsData.teams.length;i++){if(oddsData.teams[i].num===num)return oddsData.teams[i];}
  return empty;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showError(msg){var b=document.getElementById('status-bar');b.textContent='⚠ '+msg;b.classList.add('visible');}
function hideError(){document.getElementById('status-bar').classList.remove('visible');}
</script>
</body>
</html>

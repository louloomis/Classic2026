<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Race Day — Live Odds Board</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #080C14;
    --surface:  #0E1520;
    --border:   #1E2D45;
    --gold:     #F0B429;
    --win:      #22C55E;
    --place:    #3B82F6;
    --show:     #A855F7;
    --text:     #E8EAF0;
    --text-dim: #6B7280;
    --font-head: 'Bebas Neue', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ── HEADER (frozen) ── */
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 2px solid var(--border);
    padding: 0;
  }

  .header-top {
    display: flex; align-items: center;
    padding: 10px 24px 6px;
    gap: 20px;
  }
  .logo {
    font-family: var(--font-head);
    font-size: 36px; letter-spacing: 3px;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(240,180,41,0.3);
    line-height: 1;
    flex-shrink: 0;
  }
  .logo-sub {
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 3px;
    color: var(--text-dim); text-transform: uppercase;
  }

  /* Pool totals */
  .pools {
    display: flex; gap: 12px; margin-left: auto; align-items: center;
  }
  .pool-chip {
    font-family: var(--font-mono); font-size: 13px; font-weight: 500;
    padding: 6px 14px; border-radius: 4px; border: 1px solid;
  }
  .pool-chip.win   { color: var(--win);   border-color: #14532d; background: #0d2818; }
  .pool-chip.place { color: var(--place); border-color: #1e3a8a; background: #0a1628; }
  .pool-chip.show  { color: var(--show);  border-color: #581c87; background: #160d22; }
  .pool-chip.grand { color: var(--gold);  border-color: #7a5c14; background: #1a1200; }

  /* Slide indicator + timestamp */
  .header-bottom {
    display: flex; align-items: center;
    padding: 4px 24px 8px; gap: 16px;
  }
  .slide-dots { display: flex; gap: 8px; align-items: center; }
  .dot {
    width: 28px; height: 4px; border-radius: 2px;
    background: var(--border); transition: background 0.3s;
  }
  .dot.active { background: var(--gold); }

  .slide-label {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--text-dim); letter-spacing: 2px;
  }
  .timestamp {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--text-dim); margin-left: auto;
  }

  /* Progress bar */
  #progress-bar {
    height: 3px; background: var(--border);
    position: relative; overflow: hidden;
  }
  #progress-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: var(--gold);
    width: 0%;
    transition: none;
  }

  /* ── MAIN CONTENT ── */
  #content {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    padding-top: 130px; /* below frozen header */
    padding: 130px 16px 16px;
    display: flex; flex-direction: column; gap: 8px;
  }

  /* ── FLIGHT BLOCK ── */
  .flight-block {
    flex: 1;
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 8px;
    min-height: 0;
  }

  .flight-label {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border-radius: 6px; border: 2px solid;
    font-family: var(--font-head);
    line-height: 1.1;
  }
  .flight-label .fl-num {
    font-size: 32px; letter-spacing: 1px;
  }
  .flight-label .fl-word {
    font-size: 11px; letter-spacing: 3px; opacity: 0.7;
  }

  .teams-row {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
  }

  /* ── TEAM BOX ── */
  .team-box {
    border-radius: 6px; border: 1px solid;
    display: flex; flex-direction: column;
    overflow: hidden; min-height: 0;
  }
  .team-name-row {
    padding: 6px 8px 4px;
    display: flex; flex-direction: column; gap: 1px;
    flex: 1;
  }
  .team-num {
    font-family: var(--font-head);
    font-size: 20px; color: var(--gold); line-height: 1;
  }
  .team-name {
    font-family: var(--font-body);
    font-size: 12px; font-weight: 500;
    color: var(--text); line-height: 1.2;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .odds-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    border-top: 1px solid;
  }
  .odds-cell {
    padding: 4px 4px;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 11px; font-weight: 500;
    line-height: 1;
  }
  .odds-cell .odds-label {
    font-size: 8px; letter-spacing: 1px;
    opacity: 0.6; display: block; margin-bottom: 2px;
  }
  .odds-cell.win-cell   { color: var(--win);   border-right: 1px solid; }
  .odds-cell.place-cell { color: var(--place); border-right: 1px solid; }
  .odds-cell.show-cell  { color: var(--show);  }
  .odds-cell.no-bets    { color: var(--text-dim); opacity: 0.4; }

  /* ── TRANSITIONS ── */
  #slide-a, #slide-b {
    position: absolute;
    top: 130px; left: 16px; right: 16px; bottom: 16px;
    display: flex; flex-direction: column; gap: 8px;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  #slide-a.hidden, #slide-b.hidden {
    opacity: 0; pointer-events: none; transform: translateY(20px);
  }
  #slide-a.visible, #slide-b.visible {
    opacity: 1; pointer-events: all; transform: translateY(0);
  }

  /* ── CONFIG OVERLAY ── */
  #config-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.9);
    z-index: 500; display: flex; align-items: center; justify-content: center;
  }
  #config-overlay.hidden { display: none; }
  .config-box {
    background: #0E1520; border: 1px solid #353c55;
    border-radius: 10px; padding: 32px; width: 480px;
  }
  .config-title {
    font-family: var(--font-head); font-size: 28px;
    color: var(--gold); margin-bottom: 20px; letter-spacing: 2px;
  }
  .config-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .config-field label {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim);
  }
  .config-field input {
    background: var(--bg); border: 1px solid #2a2f42;
    border-radius: 6px; color: var(--text);
    font-family: var(--font-mono); font-size: 13px;
    padding: 10px 12px; outline: none; width: 100%;
    transition: border-color 0.15s;
  }
  .config-field input:focus { border-color: var(--gold); }
  .btn-start {
    width: 100%; background: var(--gold); color: #000;
    font-family: var(--font-head); font-size: 22px; letter-spacing: 2px;
    border: none; border-radius: 6px; padding: 13px;
    cursor: pointer; margin-top: 8px;
  }
  .config-note {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--text-dim); line-height: 1.7;
    background: #080C14; border-radius: 4px;
    padding: 10px 12px; margin-bottom: 16px;
  }

  /* ── ERROR / LOADING STATE ── */
  #status-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #1a0a0a; border-top: 1px solid #7f1d1d;
    color: #ef4444; font-family: var(--font-mono); font-size: 11px;
    padding: 6px 16px; display: none;
  }
  #status-bar.visible { display: block; }
</style>
</head>
<body>

<!-- Config Overlay -->
<div id="config-overlay">
  <div class="config-box">
    <div class="config-title">ODDS BOARD SETUP</div>
    <div class="config-note">
      Open this page on the device connected to your TV.<br>
      Paste your Apps Script URL below — the same one used in the wagering app.<br>
      Odds refresh every 30 seconds. Slides advance every 10 seconds.
    </div>
    <div class="config-field">
      <label>Apps Script URL</label>
      <input type="text" id="cfg-url" placeholder="https://script.google.com/macros/s/ABC.../exec">
    </div>
    <div class="config-field">
      <label>Event Name</label>
      <input type="text" id="cfg-event" placeholder="Race Day 2025">
    </div>
    <button class="btn-start" onclick="startDisplay()">START DISPLAY</button>
  </div>
</div>

<!-- Frozen Header -->
<div id="header">
  <div class="header-top">
    <div>
      <div class="logo" id="logo-text">RACE DAY</div>
      <div class="logo-sub">LIVE ODDS BOARD</div>
    </div>
    <div class="pools">
      <div class="pool-chip win"   id="pool-win">WIN $—</div>
      <div class="pool-chip place" id="pool-place">PLACE $—</div>
      <div class="pool-chip show"  id="pool-show">SHOW $—</div>
      <div class="pool-chip grand" id="pool-grand">TOTAL $—</div>
    </div>
  </div>
  <div class="header-bottom">
    <div class="slide-dots" id="slide-dots"></div>
    <div class="slide-label" id="slide-label">FLIGHTS 1–4</div>
    <div class="timestamp" id="timestamp">Last updated: —</div>
  </div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>

<!-- Slide containers -->
<div id="slide-a" class="visible"></div>
<div id="slide-b" class="hidden"></div>

<div id="status-bar"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const FLIGHTS_PER_SLIDE = 4;
const TEAMS_PER_FLIGHT  = 6;
const TOTAL_FLIGHTS     = 16;
const TOTAL_SLIDES      = TOTAL_FLIGHTS / FLIGHTS_PER_SLIDE; // 4
const SLIDE_DURATION    = 10000;  // 10 seconds per slide
const REFRESH_INTERVAL  = 30000; // refresh odds every 30 seconds
const PROGRESS_INTERVAL = 50;    // progress bar update interval (ms)

const FLIGHT_STYLES = [
  { bg: "#1A2744", border: "#6BA3E8", label: "#6BA3E8" },
  { bg: "#1A3320", border: "#4ADE80", label: "#4ADE80" },
  { bg: "#2D1A44", border: "#C084FC", label: "#C084FC" },
  { bg: "#3D1F0A", border: "#FB923C", label: "#FB923C" },
  { bg: "#1A3344", border: "#38BDF8", label: "#38BDF8" },
  { bg: "#2D2A0A", border: "#FACC15", label: "#FACC15" },
  { bg: "#1A2D2A", border: "#2DD4BF", label: "#2DD4BF" },
  { bg: "#3D0A1A", border: "#F87171", label: "#F87171" },
  { bg: "#1A2744", border: "#818CF8", label: "#818CF8" },
  { bg: "#1A3320", border: "#86EFAC", label: "#86EFAC" },
  { bg: "#2D1A44", border: "#E879F9", label: "#E879F9" },
  { bg: "#3D1F0A", border: "#FCA5A5", label: "#FCA5A5" },
  { bg: "#1A3344", border: "#7DD3FC", label: "#7DD3FC" },
  { bg: "#2D2A0A", border: "#FDE68A", label: "#FDE68A" },
  { bg: "#1A2D2A", border: "#99F6E4", label: "#99F6E4" },
  { bg: "#3D0A1A", border: "#FECACA", label: "#FECACA" },
];

let scriptUrl  = '';
let eventName  = 'Race Day';
let oddsData   = null;
let currentSlide = 0;
let activeEl   = 'a'; // which slide div is visible
let slideTimer = null;
let refreshTimer = null;
let progressTimer = null;
let progressStart = null;

// ── INIT ──────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  // Load saved config
  try {
    var saved = JSON.parse(localStorage.getItem('oddsboard_config') || '{}');
    if (saved.scriptUrl)  scriptUrl = saved.scriptUrl;
    if (saved.eventName)  eventName = saved.eventName;
  } catch(e) {}

  // Build slide dots
  var dots = document.getElementById('slide-dots');
  for (var i = 0; i < TOTAL_SLIDES; i++) {
    var d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.id = 'dot-' + i;
    dots.appendChild(d);
  }

  if (scriptUrl) {
    document.getElementById('cfg-url').value   = scriptUrl;
    document.getElementById('cfg-event').value = eventName;
    startDisplay();
  }
});

function startDisplay() {
  scriptUrl = document.getElementById('cfg-url').value.trim();
  eventName = document.getElementById('cfg-event').value.trim() || 'Race Day';

  if (!scriptUrl) {
    alert('Please enter your Apps Script URL');
    return;
  }

  localStorage.setItem('oddsboard_config', JSON.stringify({ scriptUrl, eventName }));
  document.getElementById('config-overlay').classList.add('hidden');
  document.getElementById('logo-text').textContent = eventName.toUpperCase();

  // Initial fetch then start loop
  fetchOdds().then(function() {
    startSlideshow();
  });

  // Refresh odds every 30s
  refreshTimer = setInterval(fetchOdds, REFRESH_INTERVAL);

  // Press any key / tap to show config again
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') showConfig();
  });
  document.addEventListener('dblclick', showConfig);
}

function showConfig() {
  clearInterval(slideTimer);
  clearInterval(refreshTimer);
  clearInterval(progressTimer);
  document.getElementById('config-overlay').classList.remove('hidden');
}

// ── FETCH ODDS ────────────────────────────────────────────────────────────
async function fetchOdds() {
  try {
    var res  = await fetch(scriptUrl + '?action=getOdds');
    var data = await res.json();
    if (data.success) {
      oddsData = data;
      updateHeader(data.pools, data.timestamp);
      // Re-render current slide with fresh data
      renderSlide(currentSlide, getActiveEl());
      hideError();
    } else {
      showError('Sheet error: ' + (data.error || 'unknown'));
    }
  } catch(e) {
    showError('Could not reach Apps Script: ' + e.message);
  }
}

function updateHeader(pools, timestamp) {
  document.getElementById('pool-win').textContent   = 'WIN $'   + fmt(pools.win);
  document.getElementById('pool-place').textContent = 'PLACE $' + fmt(pools.place);
  document.getElementById('pool-show').textContent  = 'SHOW $'  + fmt(pools.show);
  document.getElementById('pool-grand').textContent = 'TOTAL $' + fmt(pools.grand);
  document.getElementById('timestamp').textContent  = 'Updated: ' + timestamp;
}

function fmt(n) {
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

// ── SLIDESHOW ─────────────────────────────────────────────────────────────
function startSlideshow() {
  renderSlide(0, getActiveEl());
  updateDots(0);
  updateSlideLabel(0);
  startProgress();
  slideTimer = setInterval(advanceSlide, SLIDE_DURATION);
}

function advanceSlide() {
  var nextSlide = (currentSlide + 1) % TOTAL_SLIDES;
  var nextEl    = activeEl === 'a' ? 'b' : 'a';

  // Pre-render into the hidden div
  renderSlide(nextSlide, document.getElementById('slide-' + nextEl));

  // Swap visibility
  document.getElementById('slide-' + activeEl).classList.remove('visible');
  document.getElementById('slide-' + activeEl).classList.add('hidden');
  document.getElementById('slide-' + nextEl).classList.remove('hidden');
  document.getElementById('slide-' + nextEl).classList.add('visible');

  activeEl     = nextEl;
  currentSlide = nextSlide;
  updateDots(currentSlide);
  updateSlideLabel(currentSlide);
  startProgress();
}

function getActiveEl() {
  return document.getElementById('slide-' + activeEl);
}

function updateDots(slideIdx) {
  for (var i = 0; i < TOTAL_SLIDES; i++) {
    var d = document.getElementById('dot-' + i);
    if (d) {
      d.className = 'dot' + (i === slideIdx ? ' active' : '');
    }
  }
}

function updateSlideLabel(slideIdx) {
  var startFlight = slideIdx * FLIGHTS_PER_SLIDE + 1;
  var endFlight   = startFlight + FLIGHTS_PER_SLIDE - 1;
  var startTeam   = (slideIdx * FLIGHTS_PER_SLIDE * TEAMS_PER_FLIGHT) + 1;
  var endTeam     = startTeam + (FLIGHTS_PER_SLIDE * TEAMS_PER_FLIGHT) - 1;
  document.getElementById('slide-label').textContent =
    'FLIGHTS ' + startFlight + '–' + endFlight +
    '   |   TEAMS ' + startTeam + '–' + endTeam;
}

// ── PROGRESS BAR ──────────────────────────────────────────────────────────
function startProgress() {
  clearInterval(progressTimer);
  progressStart = Date.now();
  var fill = document.getElementById('progress-fill');
  fill.style.transition = 'none';
  fill.style.width = '0%';

  progressTimer = setInterval(function() {
    var elapsed = Date.now() - progressStart;
    var pct     = Math.min((elapsed / SLIDE_DURATION) * 100, 100);
    fill.style.width = pct + '%';
    if (pct >= 100) clearInterval(progressTimer);
  }, PROGRESS_INTERVAL);
}

// ── RENDER SLIDE ──────────────────────────────────────────────────────────
function renderSlide(slideIdx, container) {
  container.innerHTML = '';

  var startFlight = slideIdx * FLIGHTS_PER_SLIDE;

  for (var f = 0; f < FLIGHTS_PER_SLIDE; f++) {
    var flightIdx = startFlight + f;
    if (flightIdx >= TOTAL_FLIGHTS) break;

    var flightNum  = flightIdx + 1;
    var style      = FLIGHT_STYLES[flightIdx];

    // Flight block
    var block = document.createElement('div');
    block.className = 'flight-block';

    // Flight label
    var label = document.createElement('div');
    label.className = 'flight-label';
    label.style.background   = style.bg;
    label.style.borderColor  = style.border;
    label.style.color        = style.label;
    label.innerHTML = '<span class="fl-word">FLIGHT</span><span class="fl-num">' + flightNum + '</span>';

    // Teams row
    var teamsRow = document.createElement('div');
    teamsRow.className = 'teams-row';

    for (var t = 0; t < TEAMS_PER_FLIGHT; t++) {
      var teamNum = flightIdx * TEAMS_PER_FLIGHT + t + 1;
      var team    = getTeamData(teamNum);

      var box = document.createElement('div');
      box.className = 'team-box';
      box.style.background   = style.bg;
      box.style.borderColor  = style.border;

      var nameRow = document.createElement('div');
      nameRow.className = 'team-name-row';
      nameRow.innerHTML =
        '<div class="team-num">#' + String(teamNum).padStart(2, '0') + '</div>' +
        '<div class="team-name">' + escHtml(team.name) + '</div>';

      var oddsRow = document.createElement('div');
      oddsRow.className = 'odds-row';
      oddsRow.style.borderColor = style.border;

      var winNoBets   = !team.winBets;
      var placeNoBets = !team.placeBets;
      var showNoBets  = !team.showBets;

      oddsRow.innerHTML =
        '<div class="odds-cell win-cell' + (winNoBets ? ' no-bets' : '') + '" style="border-color:' + style.border + '">' +
          '<span class="odds-label">WIN</span>' +
          (winNoBets ? '—' : escHtml(team.winOdds)) +
        '</div>' +
        '<div class="odds-cell place-cell' + (placeNoBets ? ' no-bets' : '') + '" style="border-color:' + style.border + '">' +
          '<span class="odds-label">PLACE</span>' +
          (placeNoBets ? '—' : escHtml(team.placeOdds)) +
        '</div>' +
        '<div class="odds-cell show-cell' + (showNoBets ? ' no-bets' : '') + '">' +
          '<span class="odds-label">SHOW</span>' +
          (showNoBets ? '—' : escHtml(team.showOdds)) +
        '</div>';

      box.appendChild(nameRow);
      box.appendChild(oddsRow);
      teamsRow.appendChild(box);
    }

    block.appendChild(label);
    block.appendChild(teamsRow);
    container.appendChild(block);
  }
}

function getTeamData(teamNum) {
  if (!oddsData || !oddsData.teams) {
    return { name: 'Team ' + teamNum, winOdds: '—', placeOdds: '—', showOdds: '—',
             winBets: 0, placeBets: 0, showBets: 0 };
  }
  for (var i = 0; i < oddsData.teams.length; i++) {
    if (oddsData.teams[i].num === teamNum) return oddsData.teams[i];
  }
  return { name: 'Team ' + teamNum, winOdds: '—', placeOdds: '—', showOdds: '—',
           winBets: 0, placeBets: 0, showBets: 0 };
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── ERROR ─────────────────────────────────────────────────────────────────
function showError(msg) {
  var bar = document.getElementById('status-bar');
  bar.textContent = '⚠ ' + msg;
  bar.classList.add('visible');
}
function hideError() {
  document.getElementById('status-bar').classList.remove('visible');
}
</script>
</body>
</html>
